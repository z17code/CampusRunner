# ============================================================
# 校园跑腿代购系统 CampusRunner —— 主配置文件（公共项）
# ============================================================
# 本文件只承载「与环境无关的公共配置」；数据库连接等环境差异项
# 全部下沉到 application-dev.yml / application-prod.yml。
# 默认全局激活生产环境（生产上线时直接打 jar 即用，无需额外指定）。
# ------------------------------------------------------------

server:
  port: 8080

# 文件上传存储根目录（与操作系统无关，通过配置切换，避免硬编码 Windows 路径导致跨平台部署报错）
# 开发环境可在 application-dev.yml 覆盖为本地目录，生产环境在 application-prod.yml 覆盖为 Linux 绝对路径
campus:
  upload:
    path: ./uploads

spring:
  # 默认激活生产环境；本地开发用 --spring.profiles.active=dev 覆盖
  profiles:
    active: prod
  sql:
    init:
      # 启动时自动执行 schema.sql（仅 CREATE TABLE IF NOT EXISTS，不破坏已有数据）
      mode: always
  servlet:
    multipart:
      # 单个文件最大 2MB
      max-file-size: 2MB
      # 整个请求最大 10MB（支持同时上传多张凭证图片，3 张 2MB 图片 + 表单字段）
      max-request-size: 10MB

mybatis-plus:
  global-config:
    db-config:
      # 下划线转驼峰
      table-underline: true
      # 逻辑删除字段名
      logic-delete-field: deleted
      # 逻辑删除值（默认 1）
      logic-delete-value: 1
      # 逻辑未删除值（默认 0）
      logic-not-delete-value: 0
      id-type: auto
  configuration:
    # 日志输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Knife4j / SpringDoc 配置
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
