# ============================================================
# 校园跑腿代购系统 CampusRunner —— 生产环境配置（prod）
# ============================================================

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/campus_runner?serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: ${DB_PWD:a1234567}
    driver-class-name: com.mysql.cj.jdbc.Driver

# 生产环境（Linux 服务器）文件上传存储根目录：标准绝对路径
# 可通过环境变量 UPLOAD_PATH 覆盖，例如 export UPLOAD_PATH=/app/campus_runner/uploads
campus:
  upload:
    path: ${UPLOAD_PATH:/app/campus_runner/uploads}

# ============================================================
# AI 智能发单 Agent —— 生产环境空值兜底
# 优先通过环境变量 HP_AI_AGENT_KEY / HP_AI_AGENT_BASE_URL / HP_AI_AGENT_MODEL 注入；
# 未配置时 AI 功能不可用，但不会影响后端正常启动。
# ============================================================
hp:
  ai:
    agent:
      key: ${HP_AI_AGENT_KEY:}
      base-url: ${HP_AI_AGENT_BASE_URL:}
      model: ${HP_AI_AGENT_MODEL:deepseek-v4-flash}
